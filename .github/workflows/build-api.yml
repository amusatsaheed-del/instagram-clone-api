name: Build API (API Folder Copy)

on:
  push:
    branches: [main, master]
    paths:
      - "InstagramClone.Api/**"
      - "Assignment.sln"
      - "InstagramClone.Api/.github/workflows/build-api.yml"
  pull_request:
    branches: [main, master]
    paths:
      - "InstagramClone.Api/**"
      - "Assignment.sln"
      - "InstagramClone.Api/.github/workflows/build-api.yml"

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Restore
        run: dotnet restore Assignment.sln

      - name: Build API
        run: dotnet build InstagramClone.Api/InstagramClone.Api.csproj --configuration Release --no-restore
